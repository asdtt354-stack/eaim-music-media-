<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 슬라이드쇼 | EAIM 뮤지컬</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
  background: #0D1B2A; color: #fff;
  width: 100vw; height: 100vh; overflow: hidden;
}

/* ── 슬라이드 공통 ── */
#stage {
  width: 100%; height: 100%; position: relative;
}
.slide {
  position: absolute; inset: 0;
  transition: opacity 0.8s ease;
}
.slide.hidden { opacity: 0; pointer-events: none; }
.slide.visible { opacity: 1; }

.bg-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; transition: opacity 1.4s ease;
}
.bg-overlay {
  position: absolute; inset: 0;
  background:
    linear-gradient(to right, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.35) 55%, rgba(0,0,0,0.1) 100%),
    linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 45%);
}
.bg-gradient { position: absolute; inset: 0; }

/* ── 상단 바 ── */
.top-bar {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 18px 28px;
  display: flex; justify-content: space-between; align-items: center;
  background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
  z-index: 10;
}
.scene-badge {
  border-radius: 20px; padding: 4px 16px;
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
}
.eaim-label { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 3px; }

/* ── 좌측 콘텐츠 ── */
.main-content {
  position: absolute;
  top: 50%; left: 0;
  transform: translateY(-50%);
  padding: 0 36px;
  max-width: 54%;
  z-index: 10;
  transition: opacity 0.7s ease 0.3s, transform 0.7s ease 0.3s;
}
.main-content.hidden { opacity: 0; transform: translateY(calc(-50% + 18px)); }
.main-content.visible { opacity: 1; transform: translateY(-50%); }

.scene-title {
  font-size: clamp(20px, 3vw, 36px);
  font-weight: 900; color: #fff; line-height: 1.2; margin-bottom: 10px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.9);
}
.song-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 14px; border-radius: 6px; margin-bottom: 14px;
}
.song-title-text {
  font-size: clamp(13px, 1.8vw, 17px); font-weight: 700; letter-spacing: 0.5px;
}
.chars-label {
  font-size: 10px; color: rgba(255,255,255,0.4);
  letter-spacing: 2px; margin-bottom: 6px; text-transform: uppercase;
}
.chars-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.char-chip {
  padding: 3px 10px; border-radius: 12px;
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
  font-size: clamp(10px, 1.2vw, 13px); color: rgba(255,255,255,0.85);
}
.tags { display: flex; gap: 8px; flex-wrap: wrap; }
.tag-emotion {
  padding: 4px 12px; border-radius: 16px;
  font-size: 12px; font-weight: 600;
}
.tag-mood {
  padding: 4px 12px; border-radius: 16px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
  font-size: 12px; color: rgba(255,255,255,0.7);
}

/* ── 우측 가사 ── */
.lyrics-panel {
  position: absolute; top: 50%; right: 28px;
  transform: translateY(-50%);
  width: 38%; max-height: 65%; overflow: hidden;
  z-index: 10;
  transition: opacity 1s ease 0.6s;
}
.lyrics-panel.hidden { opacity: 0; }
.lyrics-panel.visible { opacity: 1; }
.lyrics-label {
  font-size: 10px; letter-spacing: 3px; margin-bottom: 10px;
  text-transform: uppercase; opacity: 0.7;
}
.lyrics-body { position: relative; padding-left: 14px; }
.lyrics-bar {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 2px;
}
.lyric-line {
  font-size: clamp(13px, 1.8vw, 18px); line-height: 1.85;
  font-weight: 500; font-style: italic;
  text-shadow: 0 1px 12px rgba(0,0,0,0.8);
}
.cursor {
  display: inline-block; width: 2px; height: 1em;
  vertical-align: middle; margin-left: 3px;
  animation: blink 0.8s step-end infinite;
}

/* ── 진행 바 ── */
.progress-bar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: rgba(255,255,255,0.08); z-index: 20;
}
.progress-fill {
  height: 100%; transition: width 0.5s ease;
}

/* ── 컨트롤 바 ── */
#controls {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 8px;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(14px);
  border-radius: 40px; padding: 7px 16px;
  border: 1px solid rgba(255,255,255,0.12); z-index: 100;
}
.ctrl-btn {
  background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,0.8); font-size: 17px; padding: 4px 8px; line-height: 1;
}
.ctrl-btn:disabled { opacity: 0.25; cursor: default; }
.dot-nav { display: flex; gap: 5px; align-items: center; padding: 0 4px; }
.dot {
  width: 7px; height: 7px; border-radius: 4px; cursor: pointer;
  background: rgba(255,255,255,0.28); transition: all 0.25s;
}
.dot.active { width: 20px; }
#key-hint {
  position: fixed; top: 20px; right: 20px;
  font-size: 10px; color: rgba(255,255,255,0.2); pointer-events: none;
}

/* ── 커버 ── */
#cover-slide {
  background: linear-gradient(135deg, #0D1B2A 0%, #1A0A2E 55%, #0A1F0A 100%);
  display: flex; align-items: center; justify-content: center;
}
.cover-orb {
  position: absolute; border-radius: 50%; pointer-events: none;
}
.cover-inner { text-align: center; z-index: 1; padding: 0 48px; }
.cover-emoji { font-size: 56px; margin-bottom: 12px; }
.cover-eyebrow { font-size: 13px; color: #5DADE2; letter-spacing: 5px; font-weight: 700; margin-bottom: 14px; text-transform: uppercase; }
.cover-title { font-size: clamp(26px, 5vw, 52px); font-weight: 900; color: #fff; line-height: 1.15; margin-bottom: 8px; text-shadow: 0 4px 30px rgba(93,173,226,0.3); }
.cover-sub { font-size: 14px; color: #AED6F1; margin-bottom: 24px; opacity: 0.7; }
.cover-count { display: inline-block; padding: 8px 22px; border-radius: 24px; background: rgba(93,173,226,0.12); border: 1px solid rgba(93,173,226,0.4); font-size: 14px; color: #AED6F1; margin-bottom: 28px; }
.cover-hint { color: rgba(255,255,255,0.25); font-size: 12px; letter-spacing: 1px; }

/* ── 엔딩 ── */
#end-slide {
  background: radial-gradient(ellipse at 50% 30%, #1a0a2e 0%, #0D1B2A 60%, #000 100%);
  overflow: hidden;
}
.star {
  position: absolute; border-radius: 50%;
  animation: twinkle 2s ease-in-out infinite alternate;
}
/* 커튼콜 */
#curtain-phase {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 0 60px;
  transition: opacity 1s ease;
}
.curtain-label { font-size: 11px; color: #FFD700; letter-spacing: 4px; margin-bottom: 8px; text-transform: uppercase; }
.curtain-song { font-size: clamp(16px, 2.5vw, 22px); color: #C778DD; font-weight: 700; letter-spacing: 1px; margin-bottom: 28px; font-style: italic; }
.curtain-lyrics-wrap { text-align: center; max-width: 600px; }
.curtain-lyric-line { font-size: clamp(16px, 2.5vw, 24px); line-height: 1.9; font-style: italic; font-weight: 500; text-shadow: 0 0 20px rgba(255,215,0,0.3); }
/* 크레딧 */
#credits-phase {
  position: absolute; inset: 0; overflow: hidden;
  transition: opacity 1.2s ease;
}
.credits-mask-top { position: absolute; top: 0; left: 0; right: 0; height: 120px; z-index: 2; background: linear-gradient(to bottom, #0D1B2A, transparent); }
.credits-mask-bot { position: absolute; bottom: 0; left: 0; right: 0; height: 160px; z-index: 2; background: linear-gradient(to top, #000, transparent); }
#credits-scroll {
  position: absolute; left: 50%; transform: translateX(-50%);
  width: min(600px, 90%); top: 100%;
}
.credits-title { text-align: center; margin-bottom: 48px; padding-top: 20px; }
.credits-divider { width: 60px; height: 2px; background: linear-gradient(to right, transparent, #5DADE2, transparent); margin: 14px auto; }
.credit-row { display: flex; justify-content: center; align-items: baseline; gap: 16px; margin-bottom: 20px; padding: 0 20px; }
.credit-role { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: uppercase; min-width: 80px; text-align: right; flex-shrink: 0; }
.credit-sep { width: 1px; height: 14px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
.credit-name { font-size: clamp(14px, 2vw, 17px); color: #fff; font-weight: 600; line-height: 1.5; }
.credits-footer { text-align: center; margin-top: 56px; padding-bottom: 40px; }
#back-btn {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  z-index: 200; padding: 10px 28px; border-radius: 8px;
  background: rgba(93,173,226,0.15); border: 1px solid rgba(93,173,226,0.5);
  color: #5DADE2; cursor: pointer; font-size: 13px; font-weight: 600;
  font-family: inherit; backdrop-filter: blur(8px); display: none;
}

/* ── API 키 모달 ── */
#api-modal {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
#api-modal.hidden { display: none; }
.api-box {
  background: linear-gradient(135deg, #13131a, #1a0a2e);
  border: 1px solid rgba(93,173,226,0.3);
  border-radius: 16px; padding: 32px; width: 100%; max-width: 440px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.api-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
.api-sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 22px; line-height: 1.6; }
.api-input {
  width: 100%; padding: 12px 14px; border-radius: 8px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(93,173,226,0.3);
  color: #fff; font-size: 13px; font-family: monospace; outline: none;
  margin-bottom: 10px; letter-spacing: 1px;
}
.api-input:focus { border-color: #5DADE2; }
.api-row { display: flex; gap: 8px; margin-bottom: 14px; }
.api-btn-ok {
  flex: 1; padding: 11px; border-radius: 8px; cursor: pointer; border: none;
  background: linear-gradient(135deg, #5DADE2, #1B4F72);
  color: #fff; font-weight: 700; font-size: 14px; font-family: inherit;
}
.api-btn-skip {
  padding: 11px 16px; border-radius: 8px; cursor: pointer;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.5); font-size: 13px; font-family: inherit;
}
.api-notice {
  font-size: 11px; color: rgba(255,255,255,0.3); line-height: 1.7;
}
.api-notice a { color: #5DADE2; }
.api-status {
  position: fixed; top: 16px; right: 16px; z-index: 1000;
  padding: 6px 14px; border-radius: 20px; font-size: 11px;
  background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.4); letter-spacing: 1px;
  display: flex; align-items: center; gap: 6px;
  cursor: pointer;
}
.api-status.gemini { border-color: rgba(93,173,226,0.4); color: #5DADE2; }
.api-status.pollinations { border-color: rgba(105,240,174,0.3); color: #69f0ae; }

/* ── 암전 (막 전환) ── */
#blackout {
  position: fixed; inset: 0; z-index: 500;
  background: #000;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease;
}
#blackout.fade-in  { opacity: 1; pointer-events: auto; }
#blackout.fade-out { opacity: 0; pointer-events: none; }

/* 막 전환 텍스트 */
#blackout-text {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  color: rgba(255,255,255,0.15);
  font-size: clamp(12px, 2vw, 18px);
  letter-spacing: 6px;
  text-transform: uppercase;
  font-family: 'Segoe UI', serif;
}

/* ── 넘버 가사 자막 (하단) ── */
.number-lyrics-bar {
  position: absolute;
  bottom: 52px; left: 50%;
  transform: translateX(-50%);
  width: 90%; max-width: 800px;
  z-index: 25; text-align: center;
  pointer-events: none;
}
.number-lyrics-title {
  font-size: clamp(10px, 1.4vw, 13px);
  color: rgba(255,255,255,0.5);
  letter-spacing: 3px; margin-bottom: 6px;
  text-transform: uppercase;
}
.number-lyrics-line {
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(4px);
  border-radius: 8px; padding: 10px 24px;
  font-size: clamp(15px, 2.4vw, 22px);
  font-weight: 700; color: #fff;
  line-height: 1.5; letter-spacing: 0.5px;
  border: 1px solid rgba(255,255,255,0.1);
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  min-height: 48px;
  transition: opacity 0.4s ease;
}
.number-lyrics-line .current-line {
  color: #FFD700;
  text-shadow: 0 0 20px rgba(255,215,0,0.4), 0 2px 8px rgba(0,0,0,0.8);
}
.number-lyrics-line .next-line {
  font-size: 0.75em;
  color: rgba(255,255,255,0.45);
  margin-top: 4px;
}
/* 가사 토글 버튼 */
.lyrics-toggle-btn {
  position: absolute; bottom: 52px; right: 16px;
  z-index: 26; background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.6); border-radius: 6px;
  padding: 4px 10px; font-size: 11px; cursor: pointer;
  font-family: inherit;
}
.speech-bubble {
  position: absolute;
  background: rgba(255,255,255,0.95);
  color: #1a1a1a; border-radius: 18px;
  padding: 10px 16px;
  font-size: clamp(12px, 1.8vw, 16px);
  font-weight: 600; line-height: 1.5;
  max-width: 220px; word-break: keep-all;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  z-index: 30; cursor: move; user-select: none;
  animation: bubblePop 0.3s ease;
  border: 2px solid rgba(0,0,0,0.06);
}
.speech-bubble::after {
  content: ''; position: absolute;
  bottom: -12px; left: 24px;
  border: 7px solid transparent;
  border-top-color: rgba(255,255,255,0.95);
  border-bottom: none;
}
.speech-bubble.tail-right::after { left:auto; right:24px; }
.speech-bubble.tail-top::after {
  bottom:auto; top:-12px;
  border-top:none;
  border-bottom:7px solid rgba(255,255,255,0.95);
}
.bubble-name {
  font-size: 10px; color: #888;
  margin-bottom: 3px; font-weight: 700; letter-spacing: 0.5px;
}
.bubble-del {
  position: absolute; top: -8px; right: -8px;
  width: 20px; height: 20px; border-radius: 50%;
  background: #ff5252; color: #fff;
  font-size: 11px; border: none; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  z-index: 31; line-height: 1;
}
.speech-bubble:hover .bubble-del { display: flex; }

/* 말풍선 컨트롤 패널 */
#bubble-panel {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.78); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 40px; padding: 7px 14px;
  display: none; align-items: center; gap: 7px;
  z-index: 200; flex-wrap: wrap; justify-content: center;
}
#bubble-panel.show { display: flex; }
#bubble-text-input {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  color: #fff; padding: 6px 12px; border-radius: 20px;
  font-size: 13px; outline: none; width: 150px; font-family: inherit;
}
#bubble-text-input::placeholder { color: rgba(255,255,255,0.35); }
#bubble-name-input {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: #fff; padding: 6px 10px; border-radius: 20px;
  font-size: 12px; outline: none; width: 90px; font-family: inherit;
}
#bubble-name-input::placeholder { color: rgba(255,255,255,0.3); }
.bubble-ctrl-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff; padding: 6px 12px; border-radius: 20px;
  font-size: 12px; cursor: pointer; white-space: nowrap; font-family: inherit;
}
.bubble-ctrl-btn:hover { background: rgba(255,255,255,0.22); }
.bubble-ctrl-btn.on { background: rgba(93,173,226,0.35); border-color: #5DADE2; color: #5DADE2; }
select.bubble-ctrl-btn { padding: 5px 8px; }

/* ── 자막 바 ── */
#subtitle-bar {
  position: absolute; bottom: 56px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.78);
  color: #fff; padding: 10px 28px; border-radius: 8px;
  font-size: clamp(14px, 2.2vw, 20px); font-weight: 600;
  text-align: center; max-width: 80%; z-index: 30;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  display: none; letter-spacing: 0.5px;
  border: 1px solid rgba(255,255,255,0.12);
  cursor: pointer;
}

@keyframes bubblePop {
  0%   { transform: scale(0.5); opacity:0; }
  70%  { transform: scale(1.08); }
  100% { transform: scale(1); opacity:1; }
}
</style>
</head>
<body>

<!-- API 키 모달 -->
<div id="api-modal">
  <div class="api-box">
    <div style="font-size:32px;margin-bottom:12px">🔑</div>
    <div class="api-title">Gemini API 키 입력</div>
    <div class="api-sub">
      배경 이미지를 Gemini AI로 생성합니다.<br>
      키가 없으면 건너뛰기 → Pollinations AI로 대체됩니다.
    </div>
    <input class="api-input" id="api-key-input" type="password"
      placeholder="AIza..." autocomplete="off" spellcheck="false">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <input type="checkbox" id="save-key" checked style="accentColor:#5DADE2">
      <label for="save-key" style="font-size:12px;color:rgba(255,255,255,0.5);cursor:pointer">
        이 브라우저에 저장 (다음에 자동 입력)
      </label>
    </div>
    <div class="api-row">
      <button class="api-btn-ok" onclick="confirmApiKey()">✓ 확인 후 시작</button>
      <button class="api-btn-skip" onclick="skipApiKey()">건너뛰기</button>
    </div>
    <div class="api-notice">
      키 발급: <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a>
      → Get API key → Create API key<br>
      키는 이 브라우저에만 저장되며 외부로 전송되지 않습니다.
    </div>
  </div>
</div>

<!-- API 상태 뱃지 -->
<div class="api-status" id="api-status" onclick="resetApiKey()" title="클릭하여 키 변경"></div>

<!-- 암전 오버레이 -->
<div id="blackout"><div id="blackout-text"></div></div>

<!-- 말풍선 컨트롤 패널 -->
<div id="bubble-panel">
  <input id="bubble-name-input" placeholder="이름" maxlength="10">
  <input id="bubble-text-input" placeholder="대사 입력..." maxlength="40">
  <select class="bubble-ctrl-btn" id="bubble-tail">
    <option value="tail-left">꼬리 ↙</option>
    <option value="tail-right">꼬리 ↘</option>
    <option value="tail-top">꼬리 ↑</option>
  </select>
  <button class="bubble-ctrl-btn" onclick="addBubble()">💬 추가</button>
  <button class="bubble-ctrl-btn" onclick="clearBubbles()">🗑 전체삭제</button>
  <button class="bubble-ctrl-btn" id="subtitle-toggle" onclick="toggleSubtitleEdit()">📝 자막</button>
  <button class="bubble-ctrl-btn" onclick="toggleBubblePanel()" style="color:rgba(255,255,255,0.4)">✕</button>
</div>

<!-- 자막 바 -->
<div id="subtitle-bar" onclick="editSubtitle()">자막을 클릭하여 편집</div>

<div id="stage"></div>
<div id="controls" style="display:none">
  <button class="ctrl-btn" id="btn-exit" title="나가기">✕</button>
  <button class="ctrl-btn" id="btn-prev">◀</button>
  <div class="dot-nav" id="dot-nav"></div>
  <button class="ctrl-btn" id="btn-next">▶</button>
  <button class="ctrl-btn" id="btn-auto" title="자동재생">⏵</button>
  <button class="ctrl-btn" id="btn-bubble" onclick="toggleBubblePanel()" title="말풍선/자막">💬</button>
</div>
<div id="key-hint">← → 키보드 | ESC 종료</div>

// ──────────────────────────────────────────────────────────────────────────────
// 이미지 생성 — Gemini 우선, 폴백 Pollinations
// ──────────────────────────────────────────────────────────────────────────────
async function fetchGeminiImage(prompt) {
  if (imgCache[prompt]) return imgCache[prompt]; // 캐시 히트
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-preview-image-generation:generateContent?key=${GEMINI_KEY}`;
  const body = {
    contents: [{ parts: [{ text: prompt + ', cinematic, theatrical, dramatic lighting, high quality, 16:9 aspect ratio' }] }],
    generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
  };
  const res  = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!res.ok) throw new Error(`Gemini API ${res.status}`);
  const data = await res.json();
  const parts = data?.candidates?.[0]?.content?.parts || [];
  const imgPart = parts.find(p => p.inlineData);
  if (!imgPart) throw new Error('이미지 없음');
  const dataUrl = `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`;
  imgCache[prompt] = dataUrl; // 캐시 저장
  return dataUrl;
}

function getPollinationsUrl(prompt) {
  const enc = encodeURIComponent(prompt + ', cinematic, theatrical, dramatic lighting, high quality');
  return `https://image.pollinations.ai/prompt/${enc}?width=1280&height=720&nologo=true`;
}

// ──────────────────────────────────────────────────────────────────────────────
// 암전 (막 전환)
// ──────────────────────────────────────────────────────────────────────────────
let isTransitioning = false;

function blackout(text, callback) {
  const bl = document.getElementById('blackout');
  const bt = document.getElementById('blackout-text');
  bt.textContent = text || '';
  bl.classList.add('fade-in');
  bl.classList.remove('fade-out');
  setTimeout(() => {
    callback();
    setTimeout(() => {
      bl.classList.remove('fade-in');
      bl.classList.add('fade-out');
      setTimeout(() => { isTransitioning = false; }, 500);
    }, 300);
  }, 500);
}

// ──────────────────────────────────────────────────────────────────────────────
// 슬라이드 전환
// ──────────────────────────────────────────────────────────────────────────────
function getSlideEl(idx) {
  if (idx === 0) return document.getElementById('cover-slide');
  if (idx === TOTAL + 1) return document.getElementById('end-slide');
  return document.getElementById(`scene-slide-${idx-1}`);
}

function showSlide(idx) {
  if (isTransitioning) return;

  // 장면 → 장면 전환만 암전 (커버→장면1, 장면→엔딩도 포함)
  const needsBlackout = (current !== idx) && !(current === 0 && idx === 0);

  if (needsBlackout) {
    isTransitioning = true;
    // 암전 텍스트: 장면 번호 표시
    const label = idx === TOTAL + 1 ? '막 내림' :
                  idx === 0 ? '' :
                  `Scene ${String(idx).padStart(2,'0')}`;
    blackout(label, () => doShowSlide(idx));
  } else {
    doShowSlide(idx);
  }
}

function doShowSlide(idx) {
  // 현재 숨기기
  const old = getSlideEl(current);
  if (old) old.className = old.className.replace('visible','hidden');

  current = idx;
  const el = getSlideEl(idx);
  if (!el) return;
  el.className = el.className.replace('hidden','visible');

  // 장면 콘텐츠 애니메이션
  if (idx >= 1 && idx <= TOTAL) {
    const sceneIdx = idx - 1;
    // 가사 줄 초기화
    initLyricBar(sceneIdx);
    setTimeout(() => {
      const mc = document.getElementById(`mc-${sceneIdx}`);
      const lp = document.getElementById(`lp-${sceneIdx}`);
      if (mc) { mc.classList.remove('hidden'); mc.classList.add('visible'); }
      if (lp) { lp.classList.remove('hidden'); lp.classList.add('visible'); }
      const scene = SCENES[sceneIdx];
      const lines = (scene.lyrics || '').split('\n').filter(Boolean);
      lines.forEach((_,i) => {
        const ll = document.getElementById(`ll-${sceneIdx}-${i}`);
        if (ll) ll.style.opacity = '1';
      });
    }, 350);
  }

  // 엔딩 애니메이션
  if (idx === TOTAL + 1) {
    document.getElementById('controls').style.display = 'none';
    document.getElementById('back-btn').style.display = 'block';
    document.getElementById('key-hint').style.display = 'none';
    startEnding();
  } else {
    document.getElementById('controls').style.display = 'flex';
    document.getElementById('back-btn').style.display = 'none';
    document.getElementById('key-hint').style.display = 'block';
  }

  updateControls();
}

// ── 엔딩 시퀀스 ──
function startEnding() {
  const lyricLines = (DATA.curtainLyrics || '').split('\n').filter(Boolean);

  // 커튼콜 가사 페이드인
  setTimeout(() => {
    lyricLines.forEach((_,i) => {
      setTimeout(() => {
        const el = document.getElementById(`cl-${i}`);
        if (el) el.style.opacity = i === lyricLines.length-1 ? '1' : '0.9';
      }, i * 600);
    });
  }, 300);

  // 크레딧로 전환
  const delay = Math.max(3000, lyricLines.length * 700 + 1800);
  setTimeout(() => {
    const cp = document.getElementById('curtain-phase');
    const cr = document.getElementById('credits-phase');
    if (cp) cp.style.opacity = '0';
    setTimeout(() => {
      if (cp) cp.style.pointerEvents = 'none';
      if (cr) { cr.style.opacity = '1'; cr.style.pointerEvents = 'auto'; }
      startCreditsScroll();
    }, 1000);
  }, delay);
}

function startCreditsScroll() {
  const scroll = document.getElementById('credits-scroll');
  if (!scroll) return;
  const duration = Math.max(12, (DATA.credits||[]).length * 2.2 + 10);
  scroll.style.transition = `top ${duration}s linear`;
  scroll.style.top = '-220%';
}

// ──────────────────────────────────────────────────────────────────────────────
// 컨트롤
// ──────────────────────────────────────────────────────────────────────────────
function updateControls() {
  const dotNav = document.getElementById('dot-nav');
  dotNav.innerHTML = '';
  const totalSlides = TOTAL + 1; // cover + scenes (엔딩 제외)
  for (let i = 0; i <= totalSlides - 1; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === current ? ' active' : '');
    const C = i === 0 ? {accent:'#5DADE2'} : getColor(SCENES[i-1]?.emotion || '');
    if (i === current) dot.style.background = C.accent;
    dot.title = i === 0 ? '커버' : (SCENES[i-1]?.title || '');
    dot.onclick = () => showSlide(i);
    dotNav.appendChild(dot);
  }
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === TOTAL + 1;
}

function goBack() {
  if (document.referrer && document.referrer.includes('musical-maker')) {
    history.back();
  } else {
    window.location.href = 'musical-maker.html';
  }
}

// 자동재생 (7초)
function toggleAuto() {
  autoPlay = !autoPlay;
  document.getElementById('btn-auto').textContent = autoPlay ? '⏸' : '⏵';
  document.getElementById('btn-auto').style.color = autoPlay ? '#5DADE2' : 'rgba(255,255,255,0.8)';
  clearInterval(autoTimer);
  if (autoPlay) {
    autoTimer = setInterval(() => {
      if (current >= TOTAL) { autoPlay = false; clearInterval(autoTimer); return; }
      showSlide(current + 1);
    }, 7000);
  }
}

// 키보드
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    if (current < TOTAL + 1) showSlide(current + 1);
  } else if (e.key === 'ArrowLeft') {
    if (current > 0) showSlide(current - 1);
  } else if (e.key === 'Escape') {
    goBack();
  }
});

document.getElementById('btn-prev').onclick = () => { if (current > 0) showSlide(current - 1); };
document.getElementById('btn-next').onclick = () => { if (current < TOTAL + 1) showSlide(current + 1); };
document.getElementById('btn-auto').onclick  = toggleAuto;
document.getElementById('btn-exit').onclick  = goBack;

// ──────────────────────────────────────────────────────────────────────────────
// 넘버 가사 자막 — 줄 넘기기
// ──────────────────────────────────────────────────────────────────────────────
const lyricLineState = {}; // sceneIdx → 현재 줄 번호

function initLyricBar(sceneIdx) {
  lyricLineState[sceneIdx] = 0;
  updateLyricBar(sceneIdx);
}

function nextLyricLine(sceneIdx) {
  const scene = SCENES[sceneIdx];
  if (!scene) return;
  const lines = (scene.lyrics || '').split('\n').filter(Boolean);
  if (!lines.length) return;
  const cur = (lyricLineState[sceneIdx] || 0);
  if (cur < lines.length - 1) {
    lyricLineState[sceneIdx] = cur + 1;
    updateLyricBar(sceneIdx);
  }
}

function prevLyricLine(sceneIdx) {
  const cur = (lyricLineState[sceneIdx] || 0);
  if (cur > 0) {
    lyricLineState[sceneIdx] = cur - 1;
    updateLyricBar(sceneIdx);
  }
}

function updateLyricBar(sceneIdx) {
  const scene = SCENES[sceneIdx];
  if (!scene) return;
  const lines = (scene.lyrics || '').split('\n').filter(Boolean);
  const cur   = lyricLineState[sceneIdx] || 0;
  const curEl  = document.getElementById(`nlb-cur-${sceneIdx}`);
  const nextEl = document.getElementById(`nlb-next-${sceneIdx}`);
  if (curEl)  curEl.textContent  = lines[cur]  || '';
  if (nextEl) nextEl.textContent = lines[cur + 1] || '';
}

function toggleLyricsBar(sceneIdx) {
  const bar = document.getElementById(`nlb-${sceneIdx}`);
  const btn = document.getElementById(`lyr-toggle-${sceneIdx}`);
  if (!bar) return;
  const hidden = bar.style.display === 'none';
  bar.style.display  = hidden ? 'block' : 'none';
  btn.textContent    = hidden ? '가사 숨기기' : '가사 보기';
}

// 키보드로 가사 줄 넘기기 — W/S 또는 위/아래 방향키
document.addEventListener('keydown', e => {
  if (e.target.id === 'bubble-text-input') return;
  const sceneIdx = current - 1;
  if (sceneIdx < 0 || sceneIdx >= TOTAL) return;
  if (e.key === 'ArrowUp'   || e.key === 'w' || e.key === 'W') {
    e.preventDefault(); prevLyricLine(sceneIdx);
  }
  if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
    e.preventDefault(); nextLyricLine(sceneIdx);
  }
});

// ──────────────────────────────────────────────────────────────────────────────
// 말풍선 & 자막 기능
// ──────────────────────────────────────────────────────────────────────────────
let bubblePanelOpen = false;

function toggleBubblePanel() {
  bubblePanelOpen = !bubblePanelOpen;
  const panel = document.getElementById('bubble-panel');
  const btn   = document.getElementById('btn-bubble');
  panel.classList.toggle('show', bubblePanelOpen);
  btn.style.color = bubblePanelOpen ? '#5DADE2' : 'rgba(255,255,255,0.8)';
}

// 현재 슬라이드 el 가져오기
function getCurrentSlideEl() {
  if (current === 0) return document.getElementById('cover-slide');
  if (current === TOTAL + 1) return document.getElementById('end-slide');
  return document.getElementById(`scene-slide-${current - 1}`);
}

// 말풍선 추가
function addBubble() {
  const text = document.getElementById('bubble-text-input').value.trim();
  if (!text) { document.getElementById('bubble-text-input').focus(); return; }
  const name     = document.getElementById('bubble-name-input').value.trim();
  const tailType = document.getElementById('bubble-tail').value;
  const slide    = getCurrentSlideEl();
  if (!slide) return;

  const bubble = document.createElement('div');
  bubble.className = `speech-bubble ${tailType}`;
  // 기본 위치 — 중앙 하단부
  bubble.style.left = '30%';
  bubble.style.top  = '55%';

  bubble.innerHTML = `
    ${name ? `<div class="bubble-name">${name}</div>` : ''}
    <span class="bubble-text">${text}</span>
    <button class="bubble-del" onclick="this.parentElement.remove()">✕</button>
  `;

  // 드래그 이동
  makeDraggable(bubble);
  slide.appendChild(bubble);

  // 입력 초기화
  document.getElementById('bubble-text-input').value = '';
  document.getElementById('bubble-text-input').focus();
}

// 드래그 기능
function makeDraggable(el) {
  let startX, startY, startL, startT;
  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('bubble-del')) return;
    e.preventDefault();
    const rect = el.getBoundingClientRect();
    const pRect = el.parentElement.getBoundingClientRect();
    startX = e.clientX;
    startY = e.clientY;
    startL = rect.left - pRect.left;
    startT = rect.top  - pRect.top;
    const onMove = mv => {
      const dx = mv.clientX - startX;
      const dy = mv.clientY - startY;
      el.style.left = (startL + dx) + 'px';
      el.style.top  = (startT + dy) + 'px';
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  // 터치 지원
  el.addEventListener('touchstart', e => {
    if (e.target.classList.contains('bubble-del')) return;
    const t = e.touches[0];
    const rect = el.getBoundingClientRect();
    const pRect = el.parentElement.getBoundingClientRect();
    startX = t.clientX; startY = t.clientY;
    startL = rect.left - pRect.left;
    startT = rect.top  - pRect.top;
    const onMove = mv => {
      const tc = mv.touches[0];
      el.style.left = (startL + tc.clientX - startX) + 'px';
      el.style.top  = (startT + tc.clientY - startY) + 'px';
    };
    const onEnd = () => {
      el.removeEventListener('touchmove', onMove);
      el.removeEventListener('touchend', onEnd);
    };
    el.addEventListener('touchmove', onMove);
    el.addEventListener('touchend', onEnd);
  }, {passive:true});
}

// 현재 장면 말풍선 전체 삭제
function clearBubbles() {
  const slide = getCurrentSlideEl();
  if (!slide) return;
  slide.querySelectorAll('.speech-bubble').forEach(b => b.remove());
}

// ── 자막 ──
let subtitleVisible = false;

function toggleSubtitleEdit() {
  const bar = document.getElementById('subtitle-bar');
  subtitleVisible = !subtitleVisible;
  if (subtitleVisible) {
    bar.style.display = 'block';
    const slide = getCurrentSlideEl();
    if (slide) slide.appendChild(bar);
    editSubtitle();
  } else {
    bar.style.display = 'none';
  }
  document.getElementById('subtitle-toggle').classList.toggle('on', subtitleVisible);
}

function editSubtitle() {
  const bar = document.getElementById('subtitle-bar');
  const cur = bar.dataset.text || '';
  const text = prompt('자막 입력 (빈칸이면 숨김):', cur);
  if (text === null) return;
  if (!text.trim()) {
    bar.style.display = 'none';
    subtitleVisible = false;
    document.getElementById('subtitle-toggle').classList.remove('on');
    return;
  }
  bar.dataset.text = text.trim();
  bar.textContent  = text.trim();
  bar.style.display = 'block';
  subtitleVisible = true;
  // 현재 슬라이드에 붙이기
  const slide = getCurrentSlideEl();
  if (slide && !slide.contains(bar)) slide.appendChild(bar);
}

// 슬라이드 전환 시 말풍선/자막 패널 위치 이동
function moveBubblePanel() {
  const bar = document.getElementById('subtitle-bar');
  if (subtitleVisible) {
    const slide = getCurrentSlideEl();
    if (slide && !slide.contains(bar)) slide.appendChild(bar);
  }
}

// ──────────────────────────────────────────────────────────────────────────────
// 초기화 — API 키 확인 후 호출
// ──────────────────────────────────────────────────────────────────────────────
function initSlideshow() {
  buildCover();
  SCENES.forEach((s, i) => buildScene(s, i));
  buildEnding();
  document.getElementById('controls').style.display = 'flex';
  showSlide(0);
  // 모든 장면 이미지 백그라운드 프리로드 (순차적으로)
  (async () => {
    for (let i = 0; i < SCENES.length; i++) {
      await loadBgImage(SCENES[i], i).catch(() => {});
    }
  })();
}

// 키보드 Enter로 말풍선 빠르게 추가
document.addEventListener('keydown', e => {
  if (e.target.id === 'bubble-text-input' && e.key === 'Enter') {
    addBubble();
  }
});

// ── 페이지 로드 — 저장된 키 확인 ──
window.addEventListener('load', () => {
  if (GEMINI_KEY) {
    document.getElementById('api-modal').classList.add('hidden');
    updateStatusBadge('gemini');
    initSlideshow();
  } else {
    showApiModal();
  }
});
</script>
