<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EAIM 뮤지컬 메이커 v3.1</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #F5C842;
            --gold-dim: #C49A1A;
            --red-deep: #7A0B1E;
            --red-mid: #9F1239;
            --bg: #0E0408;
            --surface: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.1);
            --green: #22c55e;
            --blue: #3b82f6;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(159,18,57,0.25) 0%, transparent 60%),
                repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.012) 60px, rgba(255,255,255,0.012) 61px),
                repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.012) 60px, rgba(255,255,255,0.012) 61px);
            color: #FFF;
            margin: 0; padding: 0; min-height: 100vh;
        }
        .header {
            background: linear-gradient(180deg, #5C0011 0%, #881337 60%, transparent 100%);
            border-bottom: 2px solid var(--gold);
            padding: 16px 20px 12px;
            text-align: center;
            position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(10px);
        }
        .header h1 { font-family: 'Black Han Sans', sans-serif; font-size: 1.4rem; color: var(--gold); letter-spacing: 0.15em; margin: 0 0 2px; text-shadow: 0 0 20px rgba(245,200,66,0.4); }
        .header-sub { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .header p { font-size: 0.62rem; color: rgba(255,255,255,0.35); margin: 0; letter-spacing: 0.2em; text-transform: uppercase; }
        .mode-badge { font-size: 0.6rem; padding: 2px 8px; border-radius: 10px; font-weight: 700; letter-spacing: 0.1em; }
        .mode-badge.teacher { background: rgba(245,200,66,0.2); color: var(--gold); border: 1px solid rgba(245,200,66,0.4); }
        .mode-badge.student { background: rgba(34,197,94,0.2); color: #86efac; border: 1px solid rgba(34,197,94,0.4); }
        .mode-badge.off { background: rgba(255,80,80,0.2); color: #fca5a5; border: 1px solid rgba(255,80,80,0.4); }

        /* Cards */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 14px; }
        .card-title { font-size: 0.68rem; font-weight: 700; color: var(--gold); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }

        /* Inputs */
        .t-input { background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; border-radius: 10px; width: 100%; padding: 12px 14px; font-size: 0.9rem; font-family: 'Noto Sans KR', sans-serif; outline: none; transition: border-color 0.2s, background 0.2s; }
        .t-input:focus { border-color: var(--gold); background: rgba(245,200,66,0.04); }
        .t-input::placeholder { color: rgba(255,255,255,0.2); }

        /* Buttons */
        .main-btn { background: linear-gradient(135deg, #F5C842, #E8A020); color: #000; border: none; border-radius: 12px; font-weight: 900; font-size: 0.95rem; padding: 15px; width: 100%; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 20px rgba(245,200,66,0.25); font-family: 'Noto Sans KR', sans-serif; letter-spacing: 0.05em; }
        .main-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 25px rgba(245,200,66,0.4); }
        .main-btn:active { transform: scale(0.98); }
        .main-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
        .sec-btn { background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: rgba(255,255,255,0.65); border-radius: 12px; font-size: 0.88rem; padding: 13px; cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif; width: 100%; }
        .sec-btn:hover { background: rgba(255,255,255,0.1); }
        .danger-btn { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; border-radius: 8px; font-size: 0.78rem; padding: 7px 14px; cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif; }
        .danger-btn:hover { background: rgba(239,68,68,0.2); }

        /* Genre chips */
        .genre-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .chip { background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: rgba(255,255,255,0.55); border-radius: 8px; padding: 10px 6px; text-align: center; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
        .chip:hover { border-color: rgba(245,200,66,0.4); color: rgba(255,255,255,0.85); }
        .chip.selected { background: rgba(245,200,66,0.12); border-color: var(--gold); color: var(--gold); font-weight: 700; }
        .dur-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .dur-chip { background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: rgba(255,255,255,0.55); border-radius: 8px; padding: 12px 4px; text-align: center; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
        .dur-chip.selected { background: rgba(245,200,66,0.12); border-color: var(--gold); color: var(--gold); font-weight: 700; }

        /* Counter */
        .counter-btn { width: 40px; height: 40px; background: rgba(255,255,255,0.07); border: 1px solid var(--border); border-radius: 8px; color: white; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .counter-btn:hover { background: rgba(245,200,66,0.15); border-color: var(--gold); }
        .counter-val { font-size: 2rem; font-weight: 900; color: var(--gold); min-width: 50px; text-align: center; }

        /* Toggle */
        .toggle-wrap { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: rgba(0,0,0,0.3); border-radius: 12px; border: 1px solid var(--border); }
        .toggle-track { width: 52px; height: 28px; border-radius: 14px; background: rgba(255,255,255,0.1); position: relative; cursor: pointer; transition: background 0.3s; flex-shrink: 0; }
        .toggle-track.on { background: rgba(34,197,94,0.5); border: 1px solid var(--green); }
        .toggle-thumb { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.4); position: absolute; top: 3px; left: 3px; transition: all 0.3s; }
        .toggle-track.on .toggle-thumb { left: 27px; background: var(--green); box-shadow: 0 0 8px var(--green); }

        /* Step dots */
        .step-bar { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 14px 0 4px; }
        .step-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.12); transition: all 0.3s; }
        .step-dot.active { background: var(--gold); box-shadow: 0 0 10px var(--gold); width: 22px; border-radius: 4px; }
        .step-dot.done { background: rgba(245,200,66,0.35); }

        /* Loading */
        .spin { width: 44px; height: 44px; border: 3px solid rgba(245,200,66,0.15); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Result sections */
        .result-section { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
        .result-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; cursor: pointer; transition: background 0.2s; }
        .result-header:hover { background: rgba(255,255,255,0.03); }
        .result-header.open { border-bottom: 1px solid var(--border); }
        .result-icon { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.78rem; flex-shrink: 0; }
        .result-text { background: rgba(0,0,0,0.25); border-radius: 8px; padding: 14px; font-size: 0.83rem; line-height: 1.85; color: rgba(255,255,255,0.82); white-space: pre-wrap; word-break: break-all; max-height: 380px; overflow-y: auto; font-family: 'Gowun Batang', serif; }
        .result-text.suno { color: #86efac; font-family: 'Noto Sans KR', sans-serif; font-size: 0.78rem; }
        .result-text.img-p { color: #93c5fd; font-family: monospace; font-size: 0.76rem; line-height: 1.65; }

        /* Copy btn */
        .copy-btn { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.07); border: 1px solid var(--border); color: rgba(255,255,255,0.5); border-radius: 6px; padding: 5px 9px; font-size: 0.7rem; cursor: pointer; transition: all 0.2s; }
        .copy-btn:hover { background: rgba(255,255,255,0.13); color: white; }
        .copy-btn.ok { border-color: var(--green); color: var(--green); }

        /* Dashboard */
        .work-card { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; transition: border-color 0.2s; }
        .work-card:hover { border-color: rgba(245,200,66,0.25); }
        .work-card.approved { border-left: 3px solid var(--green); }
        .work-meta { font-size: 0.68rem; color: rgba(255,255,255,0.3); margin-top: 4px; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .status-dot.new { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
        .status-dot.approved { background: var(--green); }

        /* Pills */
        .pill { background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.22); color: var(--gold); border-radius: 20px; padding: 3px 10px; font-size: 0.7rem; font-weight: 700; }
        .pill.green { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.25); color: #86efac; }

        /* Login screen */
        .login-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
        .login-box { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 380px; }
        .login-logo { font-family: 'Black Han Sans', sans-serif; font-size: 2.2rem; color: var(--gold); text-align: center; margin-bottom: 4px; text-shadow: 0 0 30px rgba(245,200,66,0.4); }
        .login-sub { font-size: 0.7rem; color: rgba(255,255,255,0.3); text-align: center; letter-spacing: 0.2em; margin-bottom: 28px; }
        .login-tab { display: flex; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 4px; margin-bottom: 22px; }
        .login-tab-btn { flex: 1; padding: 9px; border-radius: 7px; font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: all 0.2s; text-align: center; border: none; font-family: 'Noto Sans KR', sans-serif; background: none; color: rgba(255,255,255,0.35); }
        .login-tab-btn.active { background: rgba(245,200,66,0.15); color: var(--gold); }
        .input-label { font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-bottom: 6px; letter-spacing: 0.1em; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(245,200,66,0.25); border-radius: 2px; }

        .fade-in { animation: fadeIn 0.35s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Notice box */
        .notice { background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.25); border-radius: 12px; padding: 20px; text-align: center; }

        /* Tab bar */
        .tab-bar { display: flex; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--border); position: sticky; top: 62px; z-index: 90; }
        .tab-btn { flex: 1; padding: 12px 4px; font-size: 0.78rem; font-weight: 700; cursor: pointer; border: none; background: none; color: rgba(255,255,255,0.35); font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── 상수 ──
const TEACHER_PW_KEY = 'eaim_teacher_pw';
const TEACHER_API_KEY = 'eaim_teacher_api';
const CLASS_ON_KEY = 'eaim_class_on';
const WORKS_KEY = 'eaim_works';
const SESSION_KEY = 'eaim_session'; // 'teacher' | 'student' | null

const GENRES = [
    { id: 'fantasy', label: '✨ 판타지' },
    { id: 'friendship', label: '🤝 우정' },
    { id: 'growth', label: '🌱 성장' },
    { id: 'comedy', label: '😄 코미디' },
    { id: 'adventure', label: '🗺️ 모험' },
    { id: 'mystery', label: '🔍 미스터리' },
    { id: 'history', label: '🏯 역사' },
    { id: 'scifi', label: '🚀 SF' },
    { id: 'love', label: '💛 사랑' },
];
const DURATIONS = [
    { id: '10', label: '10분', scenes: 2, numbers: 2 },
    { id: '20', label: '20분', scenes: 3, numbers: 3 },
    { id: '30', label: '30분', scenes: 4, numbers: 4 },
    { id: '60', label: '60분', scenes: 7, numbers: 6 },
];

// ── 유틸 ──
const ls = {
    get: (k, fallback = null) => { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : fallback; } catch { return fallback; } },
    set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};
const tsToStr = (ts) => {
    const d = new Date(ts);
    return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
};

// ── 복사 버튼 ──
const CopyBtn = ({ text, label = '복사' }) => {
    const [ok, setOk] = useState(false);
    return (
        <button className={`copy-btn ${ok ? 'ok' : ''}`} onClick={() => { navigator.clipboard.writeText(text); setOk(true); setTimeout(() => setOk(false), 2000); }}>
            <i className={`fas ${ok ? 'fa-check' : 'fa-copy'}`}></i>{ok ? '복사됨' : label}
        </button>
    );
};

// ── 결과 섹션 ──
const ResultSection = ({ icon, iconBg, title, subtitle, content, textClass = '' }) => {
    const [open, setOpen] = useState(true);
    if (!content) return null;
    return (
        <div className="result-section">
            <div className={`result-header ${open ? 'open' : ''}`} onClick={() => setOpen(!open)}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <div className="result-icon" style={{ background: iconBg }}>{icon}</div>
                    <div>
                        <div style={{ fontSize: '0.85rem', fontWeight: 700 }}>{title}</div>
                        {subtitle && <div style={{ fontSize: '0.68rem', color: 'rgba(255,255,255,0.35)', marginTop: 1 }}>{subtitle}</div>}
                    </div>
                </div>
                <div style={{ display: 'flex', gap: 7, alignItems: 'center' }}>
                    <CopyBtn text={content} />
                    <i className={`fas fa-chevron-${open ? 'up' : 'down'}`} style={{ color: 'rgba(255,255,255,0.25)', fontSize: '0.68rem' }}></i>
                </div>
            </div>
            {open && <div style={{ padding: 14 }}><div className={`result-text ${textClass}`}>{content}</div></div>}
        </div>
    );
};

// ══════════════════════════════════════════
// 메인 앱
// ══════════════════════════════════════════
const App = () => {
    const [session, setSession] = useState(ls.get(SESSION_KEY)); // 'teacher'|'student'|null
    const [loginTab, setLoginTab] = useState('teacher'); // 'teacher'|'student'
    const [pw, setPw] = useState('');
    const [pwError, setPwError] = useState('');

    // 선생님 설정 상태
    const [teacherApiKey, setTeacherApiKey] = useState(ls.get(TEACHER_API_KEY, ''));
    const [classOn, setClassOn] = useState(ls.get(CLASS_ON_KEY, false));
    const [works, setWorks] = useState(ls.get(WORKS_KEY, []));
    const [dashTab, setDashTab] = useState('settings'); // 'settings'|'works'

    // 학생 입력 상태
    const [sStep, setSStep] = useState(0);
    const [theme, setTheme] = useState('');
    const [genre, setGenre] = useState('');
    const [castCount, setCastCount] = useState(5);
    const [duration, setDuration] = useState('');
    const [studentName, setStudentName] = useState('');
    const [loading, setLoading] = useState(false);
    const [loadStage, setLoadStage] = useState(0);
    const [result, setResult] = useState(null);

    // 초기 세팅 여부 (선생님 비밀번호)
    const teacherPwSet = !!ls.get(TEACHER_PW_KEY);

    // ── 로그인 ──
    const doLogin = () => {
        if (loginTab === 'teacher') {
            const stored = ls.get(TEACHER_PW_KEY);
            if (!stored) {
                // 최초 설정
                if (pw.length < 4) { setPwError('비밀번호는 4자리 이상이어야 해요'); return; }
                ls.set(TEACHER_PW_KEY, pw);
                ls.set(SESSION_KEY, 'teacher');
                setSession('teacher');
            } else {
                if (pw !== stored) { setPwError('비밀번호가 틀렸어요'); return; }
                ls.set(SESSION_KEY, 'teacher');
                setSession('teacher');
            }
        } else {
            // 학생 로그인
            if (!classOn) { setPwError('선생님이 아직 수업을 열지 않았어요'); return; }
            if (!studentName.trim()) { setPwError('이름을 입력해주세요'); return; }
            ls.set(SESSION_KEY, 'student');
            setSession('student');
        }
        setPw(''); setPwError('');
    };

    // ── 선생님 API 키 저장 ──
    const saveTeacherApi = (v) => {
        setTeacherApiKey(v);
        ls.set(TEACHER_API_KEY, v);
    };

    // ── 수업 ON/OFF ──
    const toggleClass = () => {
        const next = !classOn;
        setClassOn(next);
        ls.set(CLASS_ON_KEY, next);
    };

    // ── 결과물 저장 ──
    const saveWork = (workData) => {
        const newWork = {
            id: Date.now(),
            studentName: studentName || '익명',
            title: workData.title,
            theme,
            genre: GENRES.find(g => g.id === genre)?.label || genre,
            duration,
            castCount,
            approved: false,
            ts: Date.now(),
            data: workData,
        };
        const updated = [newWork, ...works];
        setWorks(updated);
        ls.set(WORKS_KEY, updated);
    };

    // ── 결과물 승인/삭제 ──
    const approveWork = (id) => {
        const updated = works.map(w => w.id === id ? { ...w, approved: !w.approved } : w);
        setWorks(updated);
        ls.set(WORKS_KEY, updated);
    };
    const deleteWork = (id) => {
        if (!confirm('이 결과물을 삭제할까요?')) return;
        const updated = works.filter(w => w.id !== id);
        setWorks(updated);
        ls.set(WORKS_KEY, updated);
    };

    // ── 결과물 다운로드 ──
    const downloadWork = (work) => {
        const d = work.data;
        const content = [
            `EAIM 뮤지컬 메이커 v3.1 — 생성 결과`,
            `${'='.repeat(40)}`,
            `학생: ${work.studentName}  |  생성: ${tsToStr(work.ts)}`,
            `장르: ${work.genre}  |  공연: ${work.duration}분  |  등장인물: ${work.castCount}명`,
            `${'='.repeat(40)}\n`,
            `[제목]\n${d.title}\n`,
            `[등장인물]\n${d.characters}\n`,
            `[대본]\n${d.script}\n`,
            `[넘버 & 가사]\n${d.numbers}\n`,
            `[Suno AI 프롬프트]\n${d.sunoPrompts}\n`,
            `[배경 이미지 프롬프트]\n${d.imagePrompts}`,
        ].join('\n');
        const el = document.createElement('a');
        el.href = URL.createObjectURL(new Blob([content], { type: 'text/plain;charset=utf-8' }));
        el.download = `${d.title || 'EAIM뮤지컬'}_${work.studentName}.txt`;
        el.click();
    };

    // ── Gemini 호출 ──
    const callGemini = async (prompt) => {
        const key = ls.get(TEACHER_API_KEY, '');
        if (!key) { alert('선생님이 API 키를 아직 설정하지 않았어요.'); return null; }
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key.trim()}`;
        try {
            const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
            const data = await res.json();
            if (data.error) { alert('Gemini 오류: ' + data.error.message); return null; }
            return data.candidates[0].content.parts[0].text;
        } catch { alert('API 연결 실패. 인터넷 연결을 확인해주세요.'); return null; }
    };

    // ── 대본 생성 ──
    const generate = async () => {
        setLoading(true); setLoadStage(0); setSStep(2);
        const dur = DURATIONS.find(d => d.id === duration);
        const genreLabel = GENRES.find(g => g.id === genre)?.label || genre;
        const timer = setInterval(() => setLoadStage(p => Math.min(p + 1, 3)), 3500);

        const prompt = `당신은 중학생을 위한 창작 뮤지컬 대본 작가입니다.

[조건]
- 주제: ${theme}
- 장르: ${genreLabel}
- 등장인물 수: ${castCount}명
- 공연 시간: ${dur.id}분 / 장면 수: ${dur.scenes} / 넘버 수: ${dur.numbers}
- 대상: 중학생

[출력 형식 — 아래 구분자를 반드시 포함]

==TITLE==
(뮤지컬 제목)

==CHARACTERS==
(등장인물: 이름 - 성격/역할, 각 1줄)

==SCRIPT==
(장면별 대본. 형식:
[장면 N: 제목]
배경: ...
(대사/지문. 넘버는 "♪ 넘버명" 표시 후 가사))

==NUMBERS==
(각 넘버:
[넘버 N: 제목]
장르/분위기: ...
가사: ...)

==SUNO_PROMPTS==
(각 넘버별 Suno AI 영문 프롬프트:
[넘버 N: 제목]
Prompt: (장르/악기/분위기/BPM 포함))

==IMAGE_PROMPTS==
(각 장면별 배경 이미지 영문 프롬프트:
[장면 N: 제목]
Prompt: (배경/분위기/조명/스타일, --ar 16:9 포함))`;

        const raw = await callGemini(prompt);
        clearInterval(timer);

        if (raw) {
            const parse = (tag) => {
                const m = raw.match(new RegExp(`==${tag}==([\\s\\S]*?)(?===\\w|$)`));
                return m ? m[1].trim() : '';
            };
            const workData = {
                raw, title: parse('TITLE'), characters: parse('CHARACTERS'),
                script: parse('SCRIPT'), numbers: parse('NUMBERS'),
                sunoPrompts: parse('SUNO_PROMPTS'), imagePrompts: parse('IMAGE_PROMPTS'),
            };
            setResult(workData);
            saveWork(workData);
        }
        setLoading(false); setLoadStage(4);
    };

    const logout = () => { ls.set(SESSION_KEY, null); setSession(null); setResult(null); setSStep(0); };

    // ══════════════════════════
    // 렌더: 로그인 화면
    // ══════════════════════════
    if (!session) {
        return (
            <div className="login-wrap fade-in">
                <div className="login-box">
                    <div className="login-logo">EAIM</div>
                    <div className="login-sub">MUSICAL MAKER v3.1</div>
                    <div className="login-tab">
                        <button className={`login-tab-btn ${loginTab === 'teacher' ? 'active' : ''}`} onClick={() => { setLoginTab('teacher'); setPwError(''); }}>🎓 선생님</button>
                        <button className={`login-tab-btn ${loginTab === 'student' ? 'active' : ''}`} onClick={() => { setLoginTab('student'); setPwError(''); }}>🎒 학생</button>
                    </div>

                    {loginTab === 'teacher' ? (
                        <div>
                            <div className="input-label">{teacherPwSet ? '비밀번호' : '비밀번호 설정 (최초 1회)'}</div>
                            <input type="password" value={pw} onChange={e => setPw(e.target.value)} className="t-input" placeholder={teacherPwSet ? '비밀번호 입력' : '새 비밀번호 설정'} onKeyDown={e => e.key === 'Enter' && doLogin()} style={{ marginBottom: 6 }} />
                            {!teacherPwSet && <div style={{ fontSize: '0.68rem', color: 'rgba(255,255,255,0.3)', marginBottom: 8 }}>* 처음 접속 시 비밀번호를 설정합니다</div>}
                        </div>
                    ) : (
                        <div>
                            {!classOn && (
                                <div className="notice" style={{ marginBottom: 14 }}>
                                    <div style={{ fontSize: '1.5rem', marginBottom: 4 }}>🔒</div>
                                    <div style={{ fontSize: '0.82rem', color: '#fca5a5' }}>선생님이 수업을 아직 열지 않았어요</div>
                                </div>
                            )}
                            <div className="input-label">이름</div>
                            <input value={studentName} onChange={e => setStudentName(e.target.value)} className="t-input" placeholder="이름을 입력하세요" onKeyDown={e => e.key === 'Enter' && doLogin()} style={{ marginBottom: 6 }} />
                        </div>
                    )}

                    {pwError && <div style={{ fontSize: '0.75rem', color: '#fca5a5', marginBottom: 10, textAlign: 'center' }}>{pwError}</div>}
                    <button className="main-btn" style={{ marginTop: 8 }} onClick={doLogin} disabled={loginTab === 'student' && !classOn}>
                        {loginTab === 'teacher' ? (teacherPwSet ? '로그인' : '시작하기') : '입장하기'}
                    </button>
                </div>
            </div>
        );
    }

    // ══════════════════════════
    // 렌더: 선생님 대시보드
    // ══════════════════════════
    if (session === 'teacher') {
        return (
            <div className="min-h-screen pb-16">
                <div className="header">
                    <h1>EAIM Musical Maker</h1>
                    <div className="header-sub">
                        <p>선생님 대시보드</p>
                        <span className="mode-badge teacher">TEACHER</span>
                        <button onClick={logout} style={{ fontSize: '0.62rem', color: 'rgba(255,255,255,0.3)', background: 'none', border: 'none', cursor: 'pointer' }}>로그아웃</button>
                    </div>
                </div>

                <div className="tab-bar">
                    <button className={`tab-btn ${dashTab === 'settings' ? 'active' : ''}`} onClick={() => setDashTab('settings')}>⚙️ 설정</button>
                    <button className={`tab-btn ${dashTab === 'works' ? 'active' : ''}`} onClick={() => setDashTab('works')}>
                        📋 결과물 {works.length > 0 && <span style={{ background: 'rgba(245,200,66,0.2)', color: 'var(--gold)', borderRadius: 8, padding: '1px 6px', fontSize: '0.65rem', marginLeft: 4 }}>{works.length}</span>}
                    </button>
                </div>

                <div className="max-w-2xl mx-auto px-4 pt-4 fade-in">

                    {/* ── 설정 탭 ── */}
                    {dashTab === 'settings' && (
                        <div>
                            {/* 수업 ON/OFF */}
                            <div className="card">
                                <div className="card-title">🎓 수업 상태</div>
                                <div className="toggle-wrap">
                                    <div>
                                        <div style={{ fontWeight: 700, fontSize: '0.9rem' }}>{classOn ? '수업 진행 중' : '수업 종료'}</div>
                                        <div style={{ fontSize: '0.72rem', color: 'rgba(255,255,255,0.35)', marginTop: 3 }}>
                                            {classOn ? '학생들이 앱에 접속할 수 있어요' : '학생 접속이 차단된 상태예요'}
                                        </div>
                                    </div>
                                    <div className={`toggle-track ${classOn ? 'on' : ''}`} onClick={toggleClass}>
                                        <div className="toggle-thumb"></div>
                                    </div>
                                </div>
                            </div>

                            {/* API 키 */}
                            <div className="card">
                                <div className="card-title">🔑 Gemini API 키</div>
                                <input type="password" value={teacherApiKey} onChange={e => saveTeacherApi(e.target.value)} className="t-input" placeholder="Gemini API 키 입력 (학생에게 노출되지 않아요)" />
                                {teacherApiKey && (
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 8, fontSize: '0.72rem', color: '#86efac' }}>
                                        <div style={{ width: 7, height: 7, borderRadius: '50%', background: 'var(--green)', boxShadow: '0 0 6px var(--green)' }}></div>
                                        API 키 저장됨 — 학생들은 키 없이 바로 사용 가능
                                    </div>
                                )}
                            </div>

                            {/* 비밀번호 변경 */}
                            <div className="card">
                                <div className="card-title">🔒 비밀번호 변경</div>
                                <ChangePwForm />
                            </div>

                            {/* 안내 */}
                            <div style={{ background: 'rgba(245,200,66,0.05)', border: '1px solid rgba(245,200,66,0.15)', borderRadius: 12, padding: 16, fontSize: '0.78rem', color: 'rgba(255,255,255,0.5)', lineHeight: 1.8 }}>
                                💡 <strong style={{ color: 'rgba(255,255,255,0.7)' }}>사용 순서</strong><br/>
                                1. API 키 입력 → 2. 수업 ON → 3. 학생에게 링크 공유<br/>
                                학생들은 이름만 입력하면 바로 대본을 만들 수 있어요.
                            </div>
                        </div>
                    )}

                    {/* ── 결과물 탭 ── */}
                    {dashTab === 'works' && (
                        <div>
                            {works.length === 0 ? (
                                <div style={{ textAlign: 'center', padding: '50px 20px', color: 'rgba(255,255,255,0.2)', fontSize: '0.85rem' }}>
                                    아직 학생 결과물이 없어요 🎭
                                </div>
                            ) : (
                                <div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                                        <div style={{ fontSize: '0.75rem', color: 'rgba(255,255,255,0.35)' }}>총 {works.length}개의 결과물</div>
                                        <button className="danger-btn" onClick={() => { if(confirm('모든 결과물을 삭제할까요?')) { setWorks([]); ls.set(WORKS_KEY, []); } }}>전체 삭제</button>
                                    </div>
                                    {works.map(w => (
                                        <WorkCard key={w.id} work={w} onApprove={approveWork} onDelete={deleteWork} onDownload={downloadWork} />
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            </div>
        );
    }

    // ══════════════════════════
    // 렌더: 학생 화면
    // ══════════════════════════
    const selGenre = GENRES.find(g => g.id === genre);
    const selDur = DURATIONS.find(d => d.id === duration);

    return (
        <div className="min-h-screen pb-16">
            <div className="header">
                <h1>EAIM Musical Maker</h1>
                <div className="header-sub">
                    <p>{studentName || '학생'} 님</p>
                    <span className="mode-badge student">STUDENT</span>
                    <button onClick={logout} style={{ fontSize: '0.62rem', color: 'rgba(255,255,255,0.3)', background: 'none', border: 'none', cursor: 'pointer' }}>나가기</button>
                </div>
            </div>

            <div className="max-w-2xl mx-auto px-4">
                <div className="step-bar">
                    {[0,1,2].map(i => <div key={i} className={`step-dot ${sStep === i ? 'active' : sStep > i ? 'done' : ''}`}></div>)}
                </div>

                {/* STEP 0 */}
                {sStep === 0 && (
                    <div className="fade-in" style={{ paddingTop: 10 }}>
                        <div className="card">
                            <div className="card-title">📝 뮤지컬 주제</div>
                            <input value={theme} onChange={e => setTheme(e.target.value)} className="t-input" placeholder="예: 환경을 지키는 중학생들의 이야기" maxLength={80} />
                            <div style={{ fontSize: '0.65rem', color: 'rgba(255,255,255,0.2)', textAlign: 'right', marginTop: 5 }}>{theme.length}/80</div>
                        </div>
                        <div className="card">
                            <div className="card-title">🎭 장르</div>
                            <div className="genre-grid">
                                {GENRES.map(g => <div key={g.id} className={`chip ${genre === g.id ? 'selected' : ''}`} onClick={() => setGenre(g.id)}>{g.label}</div>)}
                            </div>
                        </div>
                        <button className="main-btn" style={{ marginBottom: 14 }} onClick={() => setSStep(1)} disabled={!theme.trim() || !genre}>다음 →</button>
                    </div>
                )}

                {/* STEP 1 */}
                {sStep === 1 && (
                    <div className="fade-in" style={{ paddingTop: 10 }}>
                        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 12 }}>
                            <span className="pill">{selGenre?.label}</span>
                            <span className="pill" style={{ maxWidth: 180, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{theme.length > 22 ? theme.slice(0,22)+'…' : theme}</span>
                        </div>
                        <div className="card">
                            <div className="card-title">👥 등장인물 수</div>
                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 18, padding: '8px 0' }}>
                                <button className="counter-btn" onClick={() => setCastCount(Math.max(2, castCount-1))}>−</button>
                                <div style={{ textAlign: 'center' }}>
                                    <div className="counter-val">{castCount}</div>
                                    <div style={{ fontSize: '0.7rem', color: 'rgba(255,255,255,0.3)' }}>명</div>
                                </div>
                                <button className="counter-btn" onClick={() => setCastCount(Math.min(20, castCount+1))}>+</button>
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-title">⏱️ 공연 시간</div>
                            <div className="dur-grid">
                                {DURATIONS.map(d => (
                                    <div key={d.id} className={`dur-chip ${duration === d.id ? 'selected' : ''}`} onClick={() => setDuration(d.id)}>
                                        <div style={{ fontWeight: 700 }}>{d.label}</div>
                                        <div style={{ fontSize: '0.62rem', marginTop: 2, opacity: 0.55 }}>{d.scenes}장/{d.numbers}곡</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 2fr', gap: 10, marginBottom: 14 }}>
                            <button className="sec-btn" onClick={() => setSStep(0)}>← 이전</button>
                            <button className="main-btn" onClick={generate} disabled={!duration}>🎬 대본 생성!</button>
                        </div>
                    </div>
                )}

                {/* STEP 2: 로딩/결과 */}
                {sStep === 2 && (
                    <div style={{ paddingTop: 16 }}>
                        {loading ? (
                            <div className="fade-in" style={{ textAlign: 'center', padding: '44px 20px' }}>
                                <div className="spin"></div>
                                <div style={{ color: 'rgba(255,255,255,0.45)', fontSize: '0.85rem', marginBottom: 20 }}>Gemini 2.5 Flash가 대본을 쓰고 있어요...</div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: 7, alignItems: 'center' }}>
                                    {['✍️ 줄거리 구성 중...','🎭 장면별 대본 작성 중...','🎵 뮤지컬 넘버 작곡 중...','🎨 이미지 프롬프트 생성 중...'].map((s,i) => (
                                        <div key={i} style={{ fontSize: '0.78rem', color: loadStage === i ? 'var(--gold)' : loadStage > i ? 'rgba(34,197,94,0.6)' : 'rgba(255,255,255,0.2)', transition: 'color 0.4s' }}>{s}</div>
                                    ))}
                                </div>
                            </div>
                        ) : result ? (
                            <div className="fade-in">
                                <div style={{ textAlign: 'center', padding: '18px 0 14px' }}>
                                    <div style={{ fontSize: '0.6rem', color: 'rgba(255,255,255,0.3)', letterSpacing: '0.2em', marginBottom: 5 }}>완성된 뮤지컬</div>
                                    <div style={{ fontFamily: 'Black Han Sans', fontSize: '1.55rem', color: 'var(--gold)', textShadow: '0 0 20px rgba(245,200,66,0.3)' }}>{result.title || '제목 없음'}</div>
                                </div>
                                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', justifyContent: 'center', marginBottom: 14 }}>
                                    <span className="pill">{selGenre?.label}</span>
                                    <span className="pill">{castCount}명</span>
                                    <span className="pill">{duration}분</span>
                                    <span className="pill green">저장됨 ✓</span>
                                </div>

                                <ResultSection icon="👥" iconBg="rgba(139,92,246,0.3)" title="등장인물" subtitle={`${castCount}명`} content={result.characters} />
                                <ResultSection icon="📜" iconBg="rgba(245,200,66,0.2)" title="뮤지컬 대본" subtitle={`${selDur?.scenes}장면`} content={result.script} />
                                <ResultSection icon="🎵" iconBg="rgba(34,197,94,0.2)" title="넘버 & 가사" subtitle={`${selDur?.numbers}곡`} content={result.numbers} />
                                <ResultSection icon="🎧" iconBg="rgba(59,130,246,0.2)" title="Suno 음악 프롬프트" subtitle="복사 후 suno.com에 붙여넣기" content={result.sunoPrompts} textClass="suno" />
                                <ResultSection icon="🎨" iconBg="rgba(236,72,153,0.2)" title="배경 이미지 프롬프트" subtitle="Midjourney / Stable Diffusion" content={result.imagePrompts} textClass="img-p" />

                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 10 }}>
                                    <button className="sec-btn" onClick={() => { setResult(null); setSStep(0); setTheme(''); setGenre(''); setDuration(''); }}>← 새로 만들기</button>
                                    <button className="main-btn" onClick={() => {
                                        const content = `EAIM 뮤지컬\n제목: ${result.title}\n학생: ${studentName}\n\n[대본]\n${result.script}\n\n[넘버]\n${result.numbers}\n\n[Suno]\n${result.sunoPrompts}\n\n[이미지]\n${result.imagePrompts}`;
                                        const el = document.createElement('a');
                                        el.href = URL.createObjectURL(new Blob([content], {type:'text/plain;charset=utf-8'}));
                                        el.download = `${result.title||'뮤지컬'}_${studentName}.txt`;
                                        el.click();
                                    }}>
                                        <i className="fas fa-download" style={{ marginRight: 6 }}></i>다운로드
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div style={{ textAlign: 'center', padding: 40, color: 'rgba(255,255,255,0.3)' }}>
                                생성 실패<br/>
                                <button className="sec-btn" style={{ marginTop: 16, width: 'auto', padding: '10px 24px' }} onClick={() => setSStep(1)}>← 돌아가기</button>
                            </div>
                        )}
                    </div>
                )}
            </div>
        </div>
    );
};

// ── 비밀번호 변경 폼 ──
const ChangePwForm = () => {
    const [cur, setCur] = useState('');
    const [next, setNext] = useState('');
    const [msg, setMsg] = useState('');
    const change = () => {
        if (cur !== ls.get(TEACHER_PW_KEY)) { setMsg('현재 비밀번호가 틀렸어요'); return; }
        if (next.length < 4) { setMsg('새 비밀번호는 4자 이상이어야 해요'); return; }
        ls.set(TEACHER_PW_KEY, next);
        setCur(''); setNext(''); setMsg('✅ 비밀번호가 변경되었어요');
        setTimeout(() => setMsg(''), 2500);
    };
    return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            <input type="password" value={cur} onChange={e => setCur(e.target.value)} className="t-input" placeholder="현재 비밀번호" />
            <input type="password" value={next} onChange={e => setNext(e.target.value)} className="t-input" placeholder="새 비밀번호" />
            {msg && <div style={{ fontSize: '0.72rem', color: msg.startsWith('✅') ? '#86efac' : '#fca5a5' }}>{msg}</div>}
            <button className="sec-btn" style={{ marginTop: 2 }} onClick={change}>변경하기</button>
        </div>
    );
};

// ── 결과물 카드 (대시보드) ──
const WorkCard = ({ work, onApprove, onDelete, onDownload }) => {
    const [open, setOpen] = useState(false);
    return (
        <div className={`work-card ${work.approved ? 'approved' : ''}`}>
            <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
                <div className={`status-dot ${work.approved ? 'approved' : 'new'}`} style={{ marginTop: 5 }}></div>
                <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 700, fontSize: '0.92rem', color: 'var(--gold)' }}>{work.data.title || '(제목 없음)'}</div>
                    <div className="work-meta">
                        {work.studentName} · {work.genre} · {work.duration}분 · {work.castCount}명 · {tsToStr(work.ts)}
                    </div>
                    <div style={{ fontSize: '0.75rem', color: 'rgba(255,255,255,0.4)', marginTop: 4, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                        주제: {work.theme}
                    </div>
                </div>
            </div>
            <div style={{ display: 'flex', gap: 7, marginTop: 12, flexWrap: 'wrap' }}>
                <button className="copy-btn" onClick={() => setOpen(!open)}>
                    <i className={`fas fa-${open ? 'eye-slash' : 'eye'}`}></i>{open ? '접기' : '미리보기'}
                </button>
                <button className="copy-btn" style={{ borderColor: work.approved ? 'var(--green)' : undefined, color: work.approved ? 'var(--green)' : undefined }} onClick={() => onApprove(work.id)}>
                    <i className={`fas fa-${work.approved ? 'check-circle' : 'circle'}`}></i>{work.approved ? '승인됨' : '승인'}
                </button>
                <button className="copy-btn" onClick={() => onDownload(work)}>
                    <i className="fas fa-download"></i>다운로드
                </button>
                <button className="danger-btn" onClick={() => onDelete(work.id)}>삭제</button>
            </div>
            {open && (
                <div style={{ marginTop: 12, padding: 12, background: 'rgba(0,0,0,0.3)', borderRadius: 8, fontSize: '0.78rem', color: 'rgba(255,255,255,0.65)', lineHeight: 1.7, maxHeight: 300, overflowY: 'auto', whiteSpace: 'pre-wrap', fontFamily: 'Gowun Batang, serif' }}>
                    {work.data.script || work.data.raw}
                </div>
            )}
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
